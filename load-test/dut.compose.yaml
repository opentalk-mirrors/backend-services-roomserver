---
services:
  roomserver:
    image: roomserver
    build: ../
    container_name: roomserver
    # use network mode host to remove potential performance impacts of port-forwarding
    network_mode: host
    environment:
      - OT_ROOMSERVER_HTTP__ADDRESS=${DEVICE_UNDER_TEST_ADDRESS}
      - OT_ROOMSERVER_HTTP__PUBLIC_URL=${LOAD_TEST_BASE_URL}
      - OT_ROOMSERVER_METRICS__ALLOWLIST=${TEST_DEVICE_CIDR}
      - OT_ROOMSERVER_MONITORING__ADDR=${DEVICE_UNDER_TEST_ADDRESS}
    volumes:
      - ./roomserver.toml:/etc/opentalk/roomserver.toml:ro,z

  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    command:
      - --path.rootfs=/host
      - --web.listen-address=${DEVICE_UNDER_TEST_ADDRESS}
    network_mode: host
    pid: host
    restart: on-failure
    volumes:
      - /:/host:ro,z,rslave
