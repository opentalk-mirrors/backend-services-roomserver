[package]
authors.workspace = true
description = "OpenTalk RoomServer"
edition = "2021"
homepage.workspace = true
license.workspace = true
name = "opentalk-roomserver"
repository.workspace = true
version.workspace = true

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
axum.workspace = true
axum-prometheus.workspace = true
clap.workspace = true
config.workspace = true
futures.workspace = true
log.workspace = true
opentalk-roomserver-types.workspace = true
opentalk-roomserver-web-api.workspace = true
opentalk-types-api-v1 = { workspace = true, features = ["utoipa"] }
opentalk-types-common.workspace = true
opentalk-types-signaling = { workspace = true, features = ["rand"] }
opentalk-version.workspace = true
opentelemetry = "0.27.1"
opentelemetry-otlp = "0.27.0"
opentelemetry_sdk = { version = "0.27.1", features = [
  "rt-tokio-current-thread",
] }
serde.workspace = true
serde_json.workspace = true
serde_path_to_error.workspace = true
service-probe.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["rt", "signal"] }
tower = "0.5.2"
tracing.workspace = true
tracing-opentelemetry = "0.28.0"
tracing-subscriber.workspace = true
utoipa.workspace = true
utoipa-swagger-ui.workspace = true
uuid = { version = "1.11.0", features = ["v4"] }
yaml-rust2.workspace = true


[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }

[build-dependencies]
anyhow.workspace = true
opentalk-version.workspace = true
vergen = { version = "9", features = ["build", "cargo", "rustc"] }
vergen-gix = "1"

[package.metadata.cargo-machete]
ignored = ["vergen", "vergen-gix"]
