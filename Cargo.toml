[package]
authors.workspace = true
description = "OpenTalk RoomServer"
edition = "2021"
homepage.workspace = true
license.workspace = true
name = "opentalk-roomserver"
repository.workspace = true
version.workspace = true

[dependencies]
anyhow.workspace = true
axum.workspace = true
axum-prometheus.workspace = true
clap.workspace = true
config.workspace = true
log.workspace = true
opentalk-roomserver-types.workspace = true
opentalk-roomserver-web-api.workspace = true
opentalk-types.workspace = true
opentalk-types-common.workspace = true
serde.workspace = true
serde_path_to_error.workspace = true
tokio.workspace = true
tracing-subscriber.workspace = true

[workspace]
members = [
  "opentalk-roomserver-client",
  "opentalk-roomserver-types",
  "opentalk-roomserver-web-api",
]
resolver = "2"

[workspace.package]
authors = [
  "Albrecht Weiche <a.weiche@opentalk.eu>",
  "Maximilian Allies <m.allies@opentalk.eu>",
  "OpenTalk Team <mail@opentalk.eu>",
  "Wolfgang Silbermayr <w.silbermayr@opentalk.eu>",
]
homepage = "https://opentalk.eu/"
license = "EUPL-1.2"
repository = "https://gitlab.opencode.de/opentalk/roomserver"
version = "0.0.0-dev"

[workspace.dependencies]
opentalk-roomserver-types = { path = "opentalk-roomserver-types", version = "0.0.0-dev" }
opentalk-roomserver-web-api = { path = "opentalk-roomserver-web-api", version = "0.0.0-dev" }

opentalk-types = { version = "0.20.0", features = ["axum", "serde"] }
opentalk-types-common = { version = "0.20.0", features = ["serde"] }

anyhow = "1"
axum = { version = "0.7.5" }
axum-prometheus = "0.7.0"
clap = { version = "4.5", features = ["derive"] }
config = { version = "0.14", default-features = false, features = ["toml"] }
http-request-derive = "0.3.2"
log = "0.4.22"
reqwest = { version = "0.12", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1.0.125"
serde_path_to_error = "0.1.16"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = [
  "env-filter",
  "parking_lot",
] }
