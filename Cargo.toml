[workspace]
members = [
  "opentalk-roomserver",
  "opentalk-roomserver-client",
  "opentalk-roomserver-types",
  "opentalk-roomserver-web-api",
]
resolver = "2"

[workspace.package]
authors = [
  "OpenTalk Team <mail@opentalk.eu>",

  "Albrecht Weiche <a.weiche@opentalk.eu>",
  "Maximilian Allies <m.allies@opentalk.eu>",
  "Wolfgang Silbermayr <w.silbermayr@opentalk.eu>",
]
homepage = "https://opentalk.eu/"
license = "EUPL-1.2"
repository = "https://gitlab.opencode.de/opentalk/roomserver"
version = "0.0.0-dev"

[workspace.dependencies]
opentalk-roomserver-types = { path = "opentalk-roomserver-types", version = "0.0.0-dev", features = [
  "utoipa",
] }
opentalk-roomserver-web-api = { path = "opentalk-roomserver-web-api", version = "0.0.0-dev" }

opentalk-types = { version = "0.27.0", features = ["axum", "serde", "utoipa"] }
opentalk-types-common = { version = "0.27.0", features = ["serde", "utoipa"] }
opentalk-types-signaling = { version = "0.27.0", features = ["serde"] }

anyhow = "1"
async-trait = "0.1"
axum = { version = "0.7.5" }
axum-prometheus = "0.7.0"
clap = { version = "4.5", features = ["derive"] }
config = { version = "0.14", default-features = false, features = ["toml"] }
futures = "0.3.31"
http-request-derive = "0.3.2"
log = "0.4.22"
pretty_assertions = "1.4.1"
reqwest = { version = "0.12", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1.0.125"
serde_path_to_error = "0.1.16"
service-probe = "0.1.2"
thiserror = "2.0"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tokio-test = { version = "0.4" }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = [
  "env-filter",
  "parking_lot",
] }
utoipa = { version = "4", features = ["yaml"] }
utoipa-swagger-ui = { version = "7", features = ["axum"] }
yaml-rust2 = "0.9"
