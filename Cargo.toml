[package]
authors.workspace = true
edition = "2021"
homepage.workspace = true
license = "EUPL-1.2"
name = "opentalk-roomserver"
description = "OpenTalk RoomServer"
repository.workspace = true
version.workspace = true

[dependencies]
opentalk-types = { version = "0.17.0-alpha", features = ["axum", "serde"] }
axum = { version = "0.7.5" }
anyhow = "1"
axum-prometheus = "0.6.1"
log = "0.4.22"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
serde = { version = "1", features = ["derive"] }
clap = { version = "4.5", features = ["derive"] }
config = { version = "0.14", default-features = false, features = ["toml"] }
serde_path_to_error = "0.1.16"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = [
  "env-filter",
  "parking_lot",
] }
parking_lot = "0.12"

[workspace]
members = []
resolver = "2"

[workspace.package]
authors = [
  "OpenTalk Team <mail@opentalk.eu>",
  "Albrecht Weiche <a.weiche@opentalk.eu>",
  "Wolfgang Silbermayr <w.silbermayr@opentalk.eu>",
]
homepage = "https://opentalk.eu/"
repository = "https://gitlab.opencode.de/opentalk/roomserver"
version = "0.0.0-dev"
