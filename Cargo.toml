[package]
authors.workspace = true
edition = "2021"
homepage.workspace = true
license.workspace = true
name = "opentalk-roomserver"
description = "OpenTalk RoomServer"
repository.workspace = true
version.workspace = true

[dependencies]
opentalk-web-api.workspace = true
opentalk-types.workspace = true
axum.workspace = true
anyhow.workspace = true
axum-prometheus.workspace = true
log.workspace = true
tokio.workspace = true
serde.workspace = true
clap.workspace = true
config.workspace = true
serde_path_to_error.workspace = true
tracing-subscriber.workspace = true
parking_lot.workspace = true

[workspace]
members = ["opentalk-web-api"]
resolver = "2"

[workspace.package]
authors = [
  "OpenTalk Team <mail@opentalk.eu>",
  "Albrecht Weiche <a.weiche@opentalk.eu>",
  "Wolfgang Silbermayr <w.silbermayr@opentalk.eu>",
  "Maximilian Allies <m.allies@opentalk.eu>",
]
homepage = "https://opentalk.eu/"
repository = "https://gitlab.opencode.de/opentalk/roomserver"
version = "0.0.0-dev"
license = "EUPL-1.2"

[workspace.dependencies]
opentalk-web-api = { path = "opentalk-web-api", version = "0.0.0-dev" }
opentalk-types = { version = "0.18.0", features = ["axum", "serde"] }
axum = { version = "0.7.5" }
anyhow = "1"
axum-prometheus = "0.7.0"
log = "0.4.22"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
serde = { version = "1", features = ["derive"] }
clap = { version = "4.5", features = ["derive"] }
config = { version = "0.14", default-features = false, features = ["toml"] }
serde_path_to_error = "0.1.16"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = [
  "env-filter",
  "parking_lot",
] }
parking_lot = "0.12"
