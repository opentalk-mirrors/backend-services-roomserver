# SPDX-FileCopyrightText: Wolfgang Silbermayr <w.silbermayr@opentalk.eu>

[workspace]
members = [
  "modules/chat/module",
  "modules/chat/types",
  "modules/livekit/module",
  "modules/livekit/types",
  "modules/ping/module",
  "modules/ping/types",
  "modules/timer/module",
  "modules/timer/types",
  "opentalk-roomserver",
  "opentalk-roomserver-client",
  "opentalk-roomserver-dui",
  "opentalk-roomserver-room",
  "opentalk-roomserver-types",
  "opentalk-roomserver-types-signaling-chat", # TODO: find a proper name
  "opentalk-roomserver-web-api",
]
resolver = "2"

[workspace.package]
authors = [
  "OpenTalk Team <mail@opentalk.eu>",

  "Albrecht Weiche <a.weiche@opentalk.eu>",
  "Maximilian Allies <m.allies@opentalk.eu>",
  "Wolfgang Silbermayr <w.silbermayr@opentalk.eu>",
]
homepage = "https://opentalk.eu/"
license = "EUPL-1.2"
repository = "https://gitlab.opencode.de/opentalk/roomserver"
version = "0.0.0-dev"

[workspace.dependencies]
opentalk-roomserver-client = { path = "opentalk-roomserver-client", version = "0.0.0-dev" }
opentalk-roomserver-common = { path = "opentalk-roomserver-common", version = "0.0.0-dev" }
opentalk-roomserver-module-chat = { path = "modules/chat/module", version = "0.0.0-dev" }
opentalk-roomserver-module-livekit = { path = "modules/livekit/module", version = "0.0.0-dev" }
opentalk-roomserver-module-ping = { path = "modules/ping/module", version = "0.0.0-dev" }
opentalk-roomserver-module-timer = { path = "modules/timer/module", version = "0.0.0-dev" }
opentalk-roomserver-room = { path = "opentalk-roomserver-room", version = "0.0.0-dev" }
opentalk-roomserver-signaling = { path = "opentalk-roomserver-signaling", version = "0.0.0-dev" }
opentalk-roomserver-types = { path = "opentalk-roomserver-types", version = "0.0.0-dev", features = [
  "utoipa",
] }
opentalk-roomserver-types-chat = { path = "modules/chat/types", version = "0.0.0-dev" }
opentalk-roomserver-types-livekit = { path = "modules/livekit/types", version = "0.0.0-dev" }
opentalk-roomserver-types-ping = { path = "modules/ping/types", version = "0.0.0-dev" }
opentalk-roomserver-types-timer = { path = "modules/timer/types", version = "0.0.0-dev" }
opentalk-roomserver-web-api = { path = "opentalk-roomserver-web-api", version = "0.0.0-dev" }
opentalk-types-api-v1 = { version = "0.39.1", features = ["axum"] }
opentalk-types-common = { version = "0.35.2", features = ["serde", "utoipa"] }
opentalk-types-signaling = { version = "0.36.0", features = ["serde"] }
opentalk-types-signaling-chat = { version = "0.36.0" }
opentalk-types-signaling-control = { version = "0.36.0", features = ["serde"] }
opentalk-types-signaling-livekit = { version = "0.38.0", features = ["serde"] }

anyhow = "1"
async-trait = "0.1"
axum = { version = "0.8.1" }
axum-prometheus = "0.8.0"
blake3 = "1.8"
bytes = "1.10.1"
chrono = "0.4"
clap = { version = "4.5", features = ["derive"] }
config = { version = "0.15", default-features = false, features = ["toml"] }
derive_more = { version = "2", features = ["display"] }
dirs = "6.0.0"
eframe = "0.31.1"
egui = "0.31.1"
egui_extras = { version = "0.31.1", default-features = false }
egui_json_tree = "0.11.0"
env_logger = "0.11.8"
futures = "0.3.31"
http = "1.3.1"
http-request-derive = "0.4.0"
http-request-derive-client = "0.1.0"
http-request-derive-client-reqwest = "0.1.0"
insta = "1.43.1"
livekit = "0.7"
livekit-api = "0.4"
livekit-protocol = "=0.3.9"
livekit-runtime = { version = "0.4", default-features = false }
log = "0.4.22"
opentalk-types-signaling-timer = { version = "0.36", features = ["serde"] }
opentalk-version = "0.2.0"
opentelemetry = "0.29.0"
opentelemetry-otlp = { version = "0.29.0", features = ["grpc-tonic"] }
opentelemetry_sdk = { version = "0.29.0", features = [
  "rt-tokio-current-thread",
] }
pretty_assertions = "1.4.1"
rand = "0.9"
reqwest = { version = "0.12", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1.0.125" }
serde_path_to_error = "0.1.16"
service-probe = "0.2.0"
test-log = { version = "0.2.17", default-features = false }
testcontainers = "0.24.0"
thiserror = "2.0"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tokio-tungstenite = "0.27.0"
tokio-util = "0.7.15"
tower = "0.5"
tower-http = "0.6.2"
tracing = "0.1"
tracing-opentelemetry = "0.30.0"
tracing-subscriber = { version = "0.3", features = [
  "env-filter",
  "parking_lot",
] }
tungstenite = "0.27.0"
url = "2.5.2"
utoipa = { version = "5.3.1", features = ["yaml"] }
utoipa-swagger-ui = { version = "9.0.0", features = ["axum"] }
uuid = "1"
vergen = { version = "9", features = ["build", "cargo", "rustc"] }
vergen-gix = "1"
yaml-rust2 = "0.10"
